# docker-compose.yml

services:
  web-app:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    command: gunicorn --bind 0.0.0.0:5000 app:app
    restart: always

  api-service:
    build: .
    ports:
      - "5001:5001"
    env_file:
      - .env
    command: gunicorn --bind 0.0.0.0:5001 api:app
    restart: always
